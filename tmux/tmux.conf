# ============================================================================
# .tmux.conf - Alejandro Zamudio (mithologic)
# Optimized for server operations and SSH sessions
# ============================================================================

# --- Prefix: Ctrl+a (easier than Ctrl+b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on                    # Enable mouse (scroll, resize, select pane)
set -g history-limit 50000         # Generous scrollback
set -g base-index 1                # Windows start at 1 (not 0)
setw -g pane-base-index 1          # Panes start at 1
set -g renumber-windows on         # Renumber when window closed
set -sg escape-time 0              # No delay after Escape (important for vim/nvim)
set -g focus-events on             # Pass focus events to apps
set -g set-clipboard on            # System clipboard integration

# --- Splitting panes (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"    # Horizontal split
bind - split-window -v -c "#{pane_current_path}"    # Vertical split
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (Alt + arrow, no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Pane resizing (Prefix + arrow) ---
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# --- Window navigation ---
bind -n S-Left previous-window     # Shift+Left = prev window
bind -n S-Right next-window        # Shift+Right = next window

# --- Quick reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Status bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left: session name
set -g status-left-length 30
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] '

# Right: host, date, time
set -g status-right-length 60
set -g status-right '#[fg=#a6adc8]#H #[fg=#89b4fa]│ #[fg=#a6adc8]%b %d #[fg=#89b4fa]│ #[fg=#cdd6f4,bold]%H:%M '

# Window tabs
setw -g window-status-format '#[fg=#6c7086] #I:#W '
setw -g window-status-current-format '#[bg=#313244,fg=#89b4fa,bold] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# --- Useful layouts ---
# Prefix + L = operations layout (main + 2 small panes)
bind L split-window -h -p 35 \; split-window -v -p 50 \; select-pane -L
